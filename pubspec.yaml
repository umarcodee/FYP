name: ai_powered_driver_monitoring_app
description: AI-Powered Driver Safety Assistant with real-time drowsiness detection.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.5
  
  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # ML & AI
  google_ml_kit: ^0.16.0
  camera: ^0.10.5+5
  
  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # SMS
  sms_advanced: ^1.0.1
  
  # HTTP & Networking
  http: ^1.1.0
  
  # UI & Animations
  cupertino_icons: ^1.0.2
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
